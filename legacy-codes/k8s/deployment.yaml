apiVersion: apps/v1
kind: Deployment
metadata:
  name: legacy
  namespace: default
  labels:
    app: legacy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: legacy
  template:
    metadata:
      labels:
        app: legacy
    spec:
      containers:
        - name: legacy
          image: registry.digitalocean.com/coderspace-backend202/legacy:IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /documents
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /documents
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
