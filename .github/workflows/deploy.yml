name: legacy

on:
  push:
    branches: [ main ]
    paths:
      - 'legacy-codes/**'
      - '.github/workflows/deploy.yml'

env:
  IMAGE_NAME: legacy
  REGISTRY: registry.digitalocean.com/coderspace-backend202
  CLUSTER_NAME: 9043aad4-46d9-4730-b865-941f2dff244d
  NAMESPACE: default

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Kodu çek ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. doctl kurulumu & DO kimlik doğrulaması ─────────────────
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      # ── 3. DigitalOcean Container Registry'ye giriş ──────────────
      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      # ── 4. Docker image build ─────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            legacy-codes/

      # ── 5. Image'ı DOCR'a gönder ─────────────────────────────────
      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # ── 6. Deployment YAML içindeki image tag'ini güncelle ────────
      - name: Update image tag in deployment manifest
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}|g" \
            legacy-codes/k8s/deployment.yaml

      # ── 7. Kubernetes kubeconfig kaydet ───────────────────────────
      - name: Save kubeconfig for DO cluster
        run: doctl kubernetes cluster kubeconfig save ${{ env.CLUSTER_NAME }}

      # ── 8. Kubernetes'e deploy et ─────────────────────────────────
      - name: Apply Kubernetes manifests
        run: kubectl apply -f legacy-codes/k8s/

      # ── 9. Deployment durumunu doğrula ────────────────────────────
      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${{ env.IMAGE_NAME }} \
            -n ${{ env.NAMESPACE }} \
            --timeout=300s
